server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:exam-system-default-jwt-secret-change-in-production}
  expiration-ms: 604800000

exam:
  auto-submit-interval-ms: 60000

app:
  upload:
    dir: ./uploads
    download-path-prefix: /api/file/download

spring:
  application:
    name: exam-system-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/exam_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: root

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: info
    com.example.exam: debug

springdoc:
  swagger-ui:
    path: /swagger-ui.html
