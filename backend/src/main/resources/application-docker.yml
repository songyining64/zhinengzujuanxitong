# Docker / docker-compose：SPRING_PROFILES_ACTIVE=docker 时加载
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/${MYSQL_DATABASE:exam_system}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}

app:
  redis:
    enabled: true
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
